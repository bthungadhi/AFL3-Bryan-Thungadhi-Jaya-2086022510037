<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">UC People</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="Home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="About.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="Skills.html">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="Projects.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="Gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold text-primary" href="Contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="contact-section mt-5 pt-5">
        <div class="container mt-5">
            <div class="text-center mb-5">
                <h6 class="text-primary fw-bold text-uppercase">Hubungi Saya</h6>
                <h2 class="display-6 fw-bold">Get In <span class="text-primary">Touch</span></h2>
                <p class="text-muted">Punya pertanyaan atau ingin bekerja sama? Kirimkan pesan Anda!</p>
            </div>

            <div class="row g-5 justify-content-center">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm p-4 mb-4 contact-info-card">
                        <div class="d-flex align-items-center mb-3">
                            <i class="fa-solid fa-envelope text-primary fs-4 me-3"></i>
                            <div>
                                <h6 class="fw-bold mb-0">Email</h6>
                                <p class="text-muted small mb-0">bryan@student.ciputra.ac.id</p>
                            </div>
                        </div>
                        <div class="d-flex align-items-center mb-3">
                            <i class="fa-solid fa-location-dot text-primary fs-4 me-3"></i>
                            <div>
                                <h6 class="fw-bold mb-0">Lokasi</h6>
                                <p class="text-muted small mb-0">Makassar, Indonesia</p>
                            </div>
                        </div>
                    </div>

                    <div class="text-center text-md-start">
                        <h6 class="fw-bold mb-3">Ikuti Saya:</h6>
                        <div class="d-flex gap-3 justify-content-center justify-content-md-start">
                            <a href="#" class="social-icon"><i class="fa-brands fa-instagram"></i></a>
                            <a href="#" class="social-icon"><i class="fa-brands fa-linkedin"></i></a>
                            <a href="#" class="social-icon"><i class="fa-brands fa-github"></i></a>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <form class="card border-0 shadow-sm p-4">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nama Lengkap</label>
                            <input type="text" class="form-control bg-light border-0" placeholder="Masukkan nama Anda">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Alamat Email</label>
                            <input type="email" class="form-control bg-light border-0" placeholder="nama@email.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Pesan</label>
                            <textarea class="form-control bg-light border-0" rows="4" placeholder="Tulis pesan Anda di sini..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Kirim Pesan</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/script.js"></script>
</body>
</html>
